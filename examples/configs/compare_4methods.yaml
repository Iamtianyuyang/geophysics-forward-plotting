task_type: multi_method_comparison
title: "Wavefield Comparison at t = 500 ms"
data_paths:
  - examples/data/method_fd_fine.npy
  - examples/data/method_fd_coarse.npy
  - examples/data/method_smooth.npy
  - examples/data/method_perturbed.npy
method_names:
  - FD-fine
  - FD-coarse
  - Smoothed
  - Perturbed
output_dir: examples/outputs
dx: 0.01
dz: 0.01
x0: 0.0
z0: 0.0
x_label: "Distance (km)"
