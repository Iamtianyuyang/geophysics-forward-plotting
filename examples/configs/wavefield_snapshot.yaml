task_type: wavefield_snapshot
title: "Acoustic Wavefield Snapshot"
data_paths:
  - examples/data/snap_500ms.npy
output_dir: examples/outputs
dx: 0.01
dz: 0.01
x0: 0.0
z0: 0.0
x_label: "Distance (km)"
