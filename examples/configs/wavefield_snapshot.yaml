# 波场快照 — 单栏图 (85 mm)
task_type: wavefield_snapshot
title: "Acoustic Wavefield"
data_paths:
  - examples/data/snap_500ms.npy
output_dir: examples/outputs
dx: 0.01
dz: 0.01
x0: 0.0
z0: 0.0
x_label: "Distance (km)"
y_label: "Depth (km)"
colorbar_label: "Pressure (Pa)"
symmetric_clim: true
clip_percentile: 99.0
figure_size: [3.5, 2.8]
dpi: 600
export_formats:
  - pdf
  - png
parameters:
  cmap: seismic
  snapshot_time: 0.5
