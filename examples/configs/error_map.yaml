task_type: error_map
title: "Signed Error Map: FD vs RTM"
data_paths:
  - examples/data/method_a.npy   # predicted
  - examples/data/method_b.npy   # reference
output_dir: examples/outputs
dx: 0.025
dz: 0.025
x0: 0.0
z0: 0.0
x_label: "Distance (km)"
y_label: "Depth (km)"
colorbar_label: "Signed Error"
symmetric_clim: true
clip_percentile: 99.0
figure_size: [7.0, 4.0]
dpi: 600
export_formats:
  - png
parameters:
  error_mode: signed
  cmap: seismic
